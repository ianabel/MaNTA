InitialIonTemperature = 8.0
InitialMachNumber = 7.0
LowerMachNumber = 3.5
UpperMachNumber = 3.5

IonSpecies = "DeuteriumTritium"

UniformHeatSource = 500.0

useNeutralsModel = false
NeutralDensity = 0.0

# LowerPS = 2000.0
LowerPS = 10.0
# UpperPS = 500.0
UpperPS = 15.0

# ParticleSourceWidth = 0.1
ParticleSourceCenter = 1.0
ParticleSourceWidth = 0.1

lowNDiffusivity = 1e-3
lowNThreshold = 0.01
lowPDiffusivity = 1e-3
lowPThreshold = 0.01
lowLDiffusivity = 0.01
lowLThreshold = 200.0

# Extra linear diffusion for electrons
TeDiffusivity = 0.001
transitionLength = 0.1
